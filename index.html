      (function () {
        var l = window.location;
        if (l.search[1] === "p" && l.search.startsWith("?p=/")) {
          var decoded = l.search
            .slice(3)
            .split("&q=");
          var path = decoded[0].replace(/~and~/g, "&");
          var query = decoded[1] ? "?" + decoded[1].replace(/~and~/g, "&") : "";
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + path + query + l.hash);
        }
